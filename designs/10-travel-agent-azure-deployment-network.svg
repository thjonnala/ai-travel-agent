<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" font-family="'Segoe UI', 'Segoe UI Variable', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1A1A1A"/>
    </marker>
    <marker id="arrowPurple" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8661C5"/>
    </marker>
    <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5A6B7B"/>
    </marker>
    <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3DAEE9"/>
      <stop offset="1" stop-color="#0F6CBD"/>
    </linearGradient>
    <linearGradient id="gSwa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EA0EF"/>
      <stop offset="1" stop-color="#2B5797"/>
    </linearGradient>

    <g id="icon-browser">
      <rect width="64" height="48" rx="7" fill="#E8F6FD" stroke="#0F6CBD" stroke-width="2"/>
      <path d="M0,7 a7,7 0 0 1 7,-7 h50 a7,7 0 0 1 7,7 v7 h-64 z" fill="#0F6CBD"/>
      <circle cx="9" cy="7" r="2.2" fill="#FFFFFF"/>
      <circle cx="17" cy="7" r="2.2" fill="#FFFFFF"/>
      <circle cx="25" cy="7" r="2.2" fill="#FFFFFF"/>
      <rect x="8" y="20" width="26" height="9" rx="4.5" fill="#0F6CBD"/>
      <rect x="22" y="33" width="26" height="9" rx="4.5" fill="#50E6FF"/>
    </g>
    <g id="icon-swa">
      <rect width="56" height="48" rx="8" fill="url(#gSwa)"/>
      <path d="M30,7 L18,27 h8 l-4,14 L36,21 h-9 z" fill="#FFFFFF"/>
    </g>
    <g id="icon-appsvc">
      <rect width="56" height="48" rx="8" fill="url(#gBlue)"/>
      <circle cx="26" cy="25" r="13" fill="none" stroke="#FFFFFF" stroke-width="2.4"/>
      <ellipse cx="26" cy="25" rx="5.5" ry="13" fill="none" stroke="#FFFFFF" stroke-width="1.8"/>
      <line x1="13" y1="25" x2="39" y2="25" stroke="#FFFFFF" stroke-width="1.8"/>
      <circle cx="43" cy="13" r="6.5" fill="#50E6FF"/>
      <circle cx="43" cy="13" r="2.4" fill="#0F6CBD"/>
    </g>
    <g id="icon-kv">
      <rect width="52" height="48" rx="8" fill="url(#gBlue)"/>
      <circle cx="20" cy="22" r="8" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
      <line x1="27" y1="22" x2="42" y2="22" stroke="#FFFFFF" stroke-width="3.5"/>
      <line x1="36" y1="22" x2="36" y2="30" stroke="#FFFFFF" stroke-width="3.5"/>
      <line x1="42" y1="22" x2="42" y2="28" stroke="#FFFFFF" stroke-width="3.5"/>
    </g>
    <g id="icon-aoai">
      <polygon points="26,0 13,22.5 -13,22.5 -26,0 -13,-22.5 13,-22.5" fill="#E8F6FD" stroke="#0F6CBD" stroke-width="3.5" stroke-linejoin="round"/>
      <circle cx="0" cy="0" r="4" fill="#0F6CBD"/>
      <circle cx="0" cy="-13" r="3" fill="#3DAEE9"/>
      <circle cx="11" cy="6.5" r="3" fill="#3DAEE9"/>
      <circle cx="-11" cy="6.5" r="3" fill="#3DAEE9"/>
      <line x1="0" y1="-13" x2="0" y2="0" stroke="#3DAEE9" stroke-width="2"/>
      <line x1="11" y1="6.5" x2="0" y2="0" stroke="#3DAEE9" stroke-width="2"/>
      <line x1="-11" y1="6.5" x2="0" y2="0" stroke="#3DAEE9" stroke-width="2"/>
    </g>
    <g id="icon-sql">
      <path d="M0,9 v34 a26,9 0 0 0 52,0 v-34 z" fill="url(#gBlue)"/>
      <ellipse cx="26" cy="9" rx="26" ry="9" fill="#50E6FF"/>
      <text x="26" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">SQL</text>
    </g>
    <g id="icon-insights">
      <rect width="52" height="48" rx="8" fill="url(#gBlue)"/>
      <circle cx="26" cy="19" r="9" fill="none" stroke="#FFFFFF" stroke-width="3"/>
      <rect x="21" y="28" width="10" height="5" rx="2" fill="#FFFFFF"/>
      <rect x="22.5" y="35" width="7" height="3.5" rx="1.75" fill="#FFFFFF"/>
      <polyline points="20,20 24,16 28,20 32,14" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    </g>
    <g id="icon-repos">
      <rect width="52" height="48" rx="8" fill="url(#gBlue)"/>
      <circle cx="17" cy="13" r="5" fill="#FFFFFF"/>
      <circle cx="17" cy="35" r="5" fill="#FFFFFF"/>
      <circle cx="36" cy="24" r="5" fill="#FFFFFF"/>
      <line x1="17" y1="18" x2="17" y2="30" stroke="#FFFFFF" stroke-width="3"/>
      <path d="M17,30 Q17,24 31,24" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    </g>
    <g id="icon-pipeline">
      <rect width="52" height="48" rx="8" fill="url(#gBlue)"/>
      <path d="M14,14 L26,24 L14,34 z" fill="#FFFFFF"/>
      <path d="M28,14 L40,24 L28,34 z" fill="#50E6FF"/>
    </g>
    <g id="icon-dns">
      <circle cx="24" cy="24" r="22" fill="#E8F6FD" stroke="#0F6CBD" stroke-width="2.4"/>
      <ellipse cx="24" cy="24" rx="9.5" ry="22" fill="none" stroke="#0F6CBD" stroke-width="1.8"/>
      <line x1="2" y1="24" x2="46" y2="24" stroke="#0F6CBD" stroke-width="1.8"/>
      <line x1="5" y1="13" x2="43" y2="13" stroke="#0F6CBD" stroke-width="1.4"/>
      <line x1="5" y1="35" x2="43" y2="35" stroke="#0F6CBD" stroke-width="1.4"/>
    </g>
  </defs>

  <rect width="1800" height="1000" fill="#FFFFFF"/>
  <text x="900" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#243A5E">Smart AI Travel Agent — Azure deployment flow and network diagram</text>

  <!-- ===================== CI/CD plane ===================== -->
  <rect x="60" y="60" width="1680" height="150" rx="14" fill="none" stroke="#C4B0E8" stroke-width="2" stroke-dasharray="9 7"/>
  <text x="84" y="88" font-size="16" font-weight="700" fill="#5B3FA8">Azure DevOps — CI/CD plane (org thjonnala)</text>

  <g>
    <circle cx="170" cy="125" r="13" fill="#0078D4"/>
    <rect x="149" y="142" width="42" height="26" rx="13" fill="#0078D4"/>
    <text x="170" y="190" text-anchor="middle" font-size="14" fill="#243A5E">Developer</text>
  </g>
  <line x1="200" y1="135" x2="488" y2="135" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="345" y="120" text-anchor="middle" font-size="13.5" fill="#243A5E">git push → main</text>
  <g transform="translate(345,152)"><circle r="12" fill="#57A300" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">1</text></g>

  <use href="#icon-repos" x="494" y="101"/>
  <text x="520" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#243A5E">Azure Repos</text>
  <text x="520" y="188" text-anchor="middle" font-size="12" fill="#5A6B7B">smart-ai-travel-agent</text>

  <line x1="552" y1="125" x2="888" y2="125" stroke="#8661C5" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arrowPurple)"/>
  <text x="720" y="112" text-anchor="middle" font-size="12.5" fill="#5B3FA8">CI trigger (bicep/* changes)</text>
  <path d="M520,98 v-22 h770 v22" fill="none" stroke="#8661C5" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arrowPurple)"/>
  <text x="905" y="70" text-anchor="middle" font-size="12.5" fill="#5B3FA8">CI trigger (every push to main)</text>

  <use href="#icon-pipeline" x="894" y="101"/>
  <text x="920" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#243A5E">Infra pipeline</text>
  <text x="920" y="188" text-anchor="middle" font-size="12" fill="#5A6B7B">Bicep: lint · what-if · deploy</text>

  <use href="#icon-pipeline" x="1264" y="101"/>
  <text x="1290" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#243A5E">App pipeline</text>
  <text x="1290" y="188" text-anchor="middle" font-size="12" fill="#5A6B7B">build · 51 tests · Sonar/Snyk · deploy</text>

  <!-- ===================== Azure subscription ===================== -->
  <rect x="480" y="250" width="1260" height="640" rx="18" fill="none" stroke="#7FCDEE" stroke-width="2" stroke-dasharray="9 7"/>
  <text x="505" y="280" font-size="16" font-weight="700" fill="#243A5E">Azure subscription — resource group rg-travelagent-dev</text>

  <!-- westus2 band -->
  <rect x="520" y="300" width="1180" height="240" rx="12" fill="none" stroke="#9AD2F0" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="545" y="328" font-size="14" font-weight="600" fill="#5A6B7B">region: westus2</text>

  <use href="#icon-appsvc" x="812" y="340"/>
  <text x="840" y="412" text-anchor="middle" font-size="14.5" font-weight="600" fill="#243A5E">App Service (Linux F1)</text>
  <text x="840" y="430" text-anchor="middle" font-size="12" fill="#5A6B7B">app-travelagent-api · .NET 10 API</text>
  <text x="840" y="446" text-anchor="middle" font-size="12" fill="#5A6B7B">system-assigned managed identity</text>

  <use href="#icon-sql" x="1314" y="340"/>
  <text x="1340" y="416" text-anchor="middle" font-size="14.5" font-weight="600" fill="#243A5E">Azure SQL serverless</text>
  <text x="1340" y="434" text-anchor="middle" font-size="12" fill="#5A6B7B">sqldb-travelagent · auto-pause 60 min</text>
  <text x="1340" y="450" text-anchor="middle" font-size="12" fill="#5A6B7B">firewall: Azure services + dev workstation</text>

  <!-- C: API -> SQL -->
  <line x1="875" y1="364" x2="1305" y2="364" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1090" y="350" text-anchor="middle" font-size="13" fill="#243A5E">TDS 1433 / TLS (EF Core)</text>
  <g transform="translate(1090,380)"><circle r="12" fill="#0F6CBD" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">C</text></g>

  <!-- eastus2 band -->
  <rect x="520" y="580" width="1180" height="280" rx="12" fill="none" stroke="#9AD2F0" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="545" y="608" font-size="14" font-weight="600" fill="#5A6B7B">region: eastus2</text>

  <use href="#icon-swa" x="612" y="640"/>
  <text x="640" y="712" text-anchor="middle" font-size="14.5" font-weight="600" fill="#243A5E">Static Web Apps</text>
  <text x="640" y="730" text-anchor="middle" font-size="12" fill="#5A6B7B">aitravelagent.thiruapps.com</text>
  <text x="640" y="746" text-anchor="middle" font-size="12" fill="#5A6B7B">managed TLS · SPA fallback</text>

  <use href="#icon-kv" x="954" y="640"/>
  <text x="980" y="712" text-anchor="middle" font-size="14.5" font-weight="600" fill="#243A5E">Key Vault</text>
  <text x="980" y="730" text-anchor="middle" font-size="12" fill="#5A6B7B">SQL conn string · OpenAI key</text>
  <text x="980" y="746" text-anchor="middle" font-size="12" fill="#5A6B7B">RBAC: Key Vault Secrets User</text>

  <use href="#icon-aoai" x="1260" y="664"/>
  <text x="1260" y="712" text-anchor="middle" font-size="14.5" font-weight="600" fill="#243A5E">Azure OpenAI</text>
  <text x="1260" y="730" text-anchor="middle" font-size="12" fill="#5A6B7B">gpt-4o deployment 'planner'</text>

  <use href="#icon-insights" x="1504" y="640"/>
  <text x="1530" y="712" text-anchor="middle" font-size="14.5" font-weight="600" fill="#243A5E">App Insights</text>
  <text x="1530" y="730" text-anchor="middle" font-size="12" fill="#5A6B7B">+ Log Analytics workspace</text>

  <!-- ===================== Deployment arrows (purple dashed) ===================== -->
  <line x1="920" y1="152" x2="920" y2="246" stroke="#8661C5" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowPurple)"/>
  <g transform="translate(920,205)"><circle r="12" fill="#57A300" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">2</text></g>
  <text x="940" y="222" font-size="12.5" fill="#5B3FA8">az deployment sub create — provisions all resources</text>

  <line x1="1268" y1="152" x2="880" y2="336" stroke="#8661C5" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowPurple)"/>
  <g transform="translate(1105,230)"><circle r="12" fill="#57A300" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">3</text></g>
  <text x="1125" y="247" font-size="12.5" fill="#5B3FA8">zip deploy API (Kudu, HTTPS)</text>

  <line x1="1318" y1="152" x2="1338" y2="334" stroke="#8661C5" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowPurple)"/>
  <g transform="translate(1330,250)"><circle r="12" fill="#57A300" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">4</text></g>
  <text x="1350" y="267" font-size="12.5" fill="#5B3FA8">EF migration bundle (1433)</text>

  <line x1="1264" y1="135" x2="690" y2="640" stroke="#8661C5" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowPurple)"/>
  <g transform="translate(742,580)"><circle r="12" fill="#57A300" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">5</text></g>
  <text x="762" y="597" font-size="12.5" fill="#5B3FA8">SWA deploy (deployment token)</text>

  <!-- ===================== Users / network plane ===================== -->
  <g>
    <circle cx="140" cy="500" r="15" fill="#0078D4"/>
    <rect x="116" y="520" width="48" height="30" rx="15" fill="#0078D4"/>
    <text x="140" y="572" text-anchor="middle" font-size="15" fill="#243A5E">Traveler</text>
  </g>
  <line x1="140" y1="585" x2="140" y2="632" stroke="#243A5E" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arrowGray)"/>

  <use href="#icon-browser" x="108" y="640"/>
  <text x="140" y="712" text-anchor="middle" font-size="14.5" font-weight="600" fill="#243A5E">Web browser</text>
  <text x="140" y="730" text-anchor="middle" font-size="12" fill="#5A6B7B">React SPA</text>

  <use href="#icon-dns" x="296" y="640"/>
  <text x="320" y="712" text-anchor="middle" font-size="14.5" font-weight="600" fill="#243A5E">DNS</text>
  <text x="320" y="730" text-anchor="middle" font-size="12" fill="#5A6B7B">CNAME → SWA</text>

  <!-- A: browser -> DNS -> SWA -->
  <line x1="176" y1="664" x2="290" y2="664" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="348" y1="664" x2="604" y2="664" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="476" y="650" text-anchor="middle" font-size="13" fill="#243A5E">HTTPS 443 — static assets</text>
  <g transform="translate(476,680)"><circle r="12" fill="#0F6CBD" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">A</text></g>

  <!-- B: browser -> App Service -->
  <line x1="172" y1="636" x2="806" y2="386" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(440,530)"><circle r="12" fill="#0F6CBD" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">B</text></g>
  <text x="462" y="522" font-size="13" fill="#243A5E">HTTPS 443 — REST/JSON</text>
  <text x="462" y="540" font-size="12" fill="#5A6B7B">CORS: SWA + custom domain only</text>

  <!-- D: App Service -> Key Vault -->
  <line x1="852" y1="392" x2="972" y2="636" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(890,505)"><circle r="12" fill="#0F6CBD" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">D</text></g>
  <text x="845" y="555" font-size="12.5" fill="#243A5E">443 · Key Vault references</text>
  <text x="845" y="572" font-size="12" fill="#5A6B7B">(managed identity)</text>

  <!-- E: App Service -> OpenAI -->
  <line x1="872" y1="386" x2="1242" y2="640" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(1080,525)"><circle r="12" fill="#0F6CBD" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">E</text></g>
  <text x="1100" y="535" font-size="12.5" fill="#243A5E">443 · chat completions</text>

  <!-- F: App Service -> App Insights -->
  <line x1="880" y1="378" x2="1508" y2="644" stroke="#5A6B7B" stroke-width="1.8" stroke-dasharray="3 4" marker-end="url(#arrowGray)"/>
  <g transform="translate(1330,570)"><circle r="12" fill="#0F6CBD" stroke="#FFFFFF" stroke-width="2"/><text y="4.5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">F</text></g>
  <text x="1350" y="580" font-size="12.5" fill="#5A6B7B">telemetry</text>

  <!-- ===================== Legend ===================== -->
  <rect x="1400" y="908" width="340" height="80" rx="10" fill="#FFFFFF" stroke="#9AD2F0" stroke-width="1.4"/>
  <line x1="1416" y1="928" x2="1466" y2="928" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1476" y="932" font-size="12.5" fill="#243A5E">runtime network traffic (port labeled)</text>
  <line x1="1416" y1="950" x2="1466" y2="950" stroke="#8661C5" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowPurple)"/>
  <text x="1476" y="954" font-size="12.5" fill="#243A5E">CI/CD deployment flow (steps 1–5)</text>
  <line x1="1416" y1="972" x2="1466" y2="972" stroke="#5A6B7B" stroke-width="1.8" stroke-dasharray="3 4" marker-end="url(#arrowGray)"/>
  <text x="1476" y="976" font-size="12.5" fill="#243A5E">telemetry / identity (A–F = network flows)</text>

  <!-- ===================== Microsoft Azure logo ===================== -->
  <g>
    <path d="M60,975 L85,926 L110,975 L97,975 L85,951 L73,975 Z" fill="#0078D4"/>
    <path d="M85,926 L110,975 L97,975 L85,951 Z" fill="#3DAEE9"/>
    <text x="124" y="968" font-size="20" fill="#243A5E">Microsoft <tspan font-weight="700">Azure</tspan></text>
  </g>
</svg>
