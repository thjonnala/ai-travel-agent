# App CI/CD: build + test + SonarCloud analysis, then deploy API (App Service),
# DB migrations (EF bundle), and frontend (Static Web App).
#
# Infrastructure is provisioned by the smart-ai-travel-agent-infra pipeline;
# this pipeline discovers resource names from the resource group at runtime so
# nothing environment-specific is hardcoded.
#
# SonarCloud: requires the 'sonarcloud-travel-agent' service connection
# (SonarCloud token) and the SonarCloud extension installed in the org.
trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  serviceConnection: 'azure-travel-agent'
  sonarServiceConnection: 'sonarcloud-travel-agent'
  sonarOrganization: 'thjonnala'
  resourceGroup: 'rg-travelagent-dev'
  buildConfiguration: 'Release'

stages:
  - stage: Build
    displayName: Build, test & analyze
    jobs:
      - job: Backend
        displayName: Backend build + tests + Sonar
        steps:
          - task: UseDotNet@2
            displayName: Install .NET 10 SDK
            inputs:
              packageType: sdk
              version: 10.0.x

          - task: SonarCloudPrepare@3
            displayName: SonarCloud prepare (backend)
            inputs:
              SonarQube: $(sonarServiceConnection)
              organization: $(sonarOrganization)
              scannerMode: dotnet
              projectKey: $(sonarOrganization)_travelagent-backend
              projectName: travelagent-backend
              extraProperties: |
                sonar.cs.opencover.reportsPaths=$(Agent.TempDirectory)/TestResults/**/coverage.opencover.xml
                sonar.cs.vstest.reportsPaths=$(Agent.TempDirectory)/TestResults/*.trx
                sonar.exclusions=**/Persistence/Migrations/**

          - bash: |
              set -euo pipefail
              dotnet test backend/TravelAgent.slnx \
                --configuration $(buildConfiguration) --nologo \
                --logger trx --results-directory $(Agent.TempDirectory)/TestResults \
                --collect:"XPlat Code Coverage" \
                -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover,cobertura
            displayName: dotnet test with coverage

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/*.trx'
              testRunTitle: backend

          - task: PublishCodeCoverageResults@2
            displayName: Publish coverage to Azure DevOps
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'

          - task: SonarCloudAnalyze@3
            displayName: SonarCloud analyze

          - task: SonarCloudPublish@3
            displayName: SonarCloud publish quality gate
            inputs:
              pollingTimeoutSec: '300'

          # Extension task: results also appear in the build's "Snyk Report" tab.
          # Reads obj/project.assets.json produced by the test/build step above.
          - task: SnykSecurityScan@1
            displayName: Snyk scan backend dependencies
            inputs:
              serviceConnectionEndpoint: 'snyk-travel-agent'
              testType: app
              severityThreshold: high
              monitorWhen: always
              failOnIssues: true
              additionalArguments: '--all-projects --exclude=frontend,node_modules,dist'

          - bash: |
              set -euo pipefail
              dotnet publish backend/src/TravelAgent.Api -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)/api
              dotnet tool restore
              dotnet ef migrations bundle \
                --project backend/src/TravelAgent.Infrastructure \
                --startup-project backend/src/TravelAgent.Api \
                --configuration $(buildConfiguration) \
                --self-contained -r linux-x64 \
                --output $(Build.ArtifactStagingDirectory)/migrations/efbundle
            displayName: Publish API + build EF migration bundle

          - task: ArchiveFiles@2
            displayName: Zip API
            inputs:
              rootFolderOrFile: $(Build.ArtifactStagingDirectory)/api
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/drop/api.zip

          - bash: cp $(Build.ArtifactStagingDirectory)/migrations/efbundle $(Build.ArtifactStagingDirectory)/drop/efbundle
            displayName: Stage migration bundle

          - publish: $(Build.ArtifactStagingDirectory)/drop
            artifact: drop

      - job: Frontend
        displayName: Frontend lint + build + Sonar
        steps:
          - task: SonarCloudPrepare@3
            displayName: SonarCloud prepare (frontend)
            inputs:
              SonarQube: $(sonarServiceConnection)
              organization: $(sonarOrganization)
              scannerMode: cli
              configMode: manual
              cliProjectKey: $(sonarOrganization)_travelagent-frontend
              cliProjectName: travelagent-frontend
              cliSources: frontend/src

          - bash: |
              set -euo pipefail
              cd frontend
              npm ci
              npm run lint
              npm run build
            displayName: npm ci + lint + build

          - task: SnykSecurityScan@1
            displayName: Snyk scan frontend dependencies
            inputs:
              serviceConnectionEndpoint: 'snyk-travel-agent'
              testType: app
              targetFile: frontend/package-lock.json
              severityThreshold: high
              monitorWhen: always
              failOnIssues: true

          - task: SonarCloudAnalyze@3
            displayName: SonarCloud analyze

          - task: SonarCloudPublish@3
            displayName: SonarCloud publish quality gate
            inputs:
              pollingTimeoutSec: '300'

  - stage: Deploy
    displayName: Deploy dev
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Deploy
        displayName: Migrate DB, deploy API + frontend
        steps:
          - checkout: self

          - download: current
            artifact: drop

          - task: AzureCLI@2
            displayName: Resolve resource names from resource group
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                RG='$(resourceGroup)'
                API_APP=$(az webapp list -g "$RG" --query "[?starts_with(name, 'app-travelagent-api')].name | [0]" -o tsv)
                SWA_NAME=$(az staticwebapp list -g "$RG" --query "[0].name" -o tsv)
                SWA_HOST=$(az staticwebapp show -n "$SWA_NAME" -g "$RG" --query defaultHostname -o tsv)
                KV_NAME=$(az keyvault list -g "$RG" --query "[0].name" -o tsv)
                SWA_TOKEN=$(az staticwebapp secrets list -n "$SWA_NAME" -g "$RG" --query properties.apiKey -o tsv)
                echo "##vso[task.setvariable variable=apiAppName]$API_APP"
                echo "##vso[task.setvariable variable=apiUrl]https://$API_APP.azurewebsites.net"
                echo "##vso[task.setvariable variable=swaName]$SWA_NAME"
                echo "##vso[task.setvariable variable=swaHostname]$SWA_HOST"
                echo "##vso[task.setvariable variable=keyVaultName]$KV_NAME"
                echo "##vso[task.setvariable variable=swaDeployToken;issecret=true]$SWA_TOKEN"
                echo "Resolved: api=$API_APP swa=$SWA_NAME kv=$KV_NAME"

          - task: AzureCLI@2
            displayName: Run EF Core migrations
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                CONN=$(az keyvault secret show --vault-name '$(keyVaultName)' --name TravelAgentDb-ConnectionString --query value -o tsv)
                chmod +x $(Pipeline.Workspace)/drop/efbundle
                # Hosted agents run in Azure, covered by the AllowAllWindowsAzureIps firewall rule.
                $(Pipeline.Workspace)/drop/efbundle --connection "$CONN"

          - task: AzureWebApp@1
            displayName: Deploy API to App Service
            inputs:
              azureSubscription: $(serviceConnection)
              appType: webAppLinux
              appName: $(apiAppName)
              package: $(Pipeline.Workspace)/drop/api.zip
              runtimeStack: 'DOTNETCORE|10.0'

          - task: AzureCLI@2
            displayName: Lock API CORS to the frontend origins
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                # Default SWA hostname plus any custom domains mapped to it.
                ORIGINS="https://$(swaHostname)"
                for DOMAIN in $(az staticwebapp show -n '$(swaName)' -g '$(resourceGroup)' --query "customDomains" -o tsv); do
                  ORIGINS="$ORIGINS,https://$DOMAIN"
                done
                echo "CORS origins: $ORIGINS"
                az webapp config appsettings set -g '$(resourceGroup)' -n '$(apiAppName)' \
                  --settings "Cors__AllowedOrigins=$ORIGINS" --output none

          - bash: |
              set -euo pipefail
              cd frontend
              npm ci
              VITE_API_BASE_URL='$(apiUrl)' npm run build
            displayName: Build frontend against deployed API

          - task: AzureStaticWebApp@0
            displayName: Deploy frontend to Static Web App
            inputs:
              app_location: frontend/dist
              skip_app_build: true
              skip_api_build: true
              azure_static_web_apps_api_token: $(swaDeployToken)

          - task: AzureCLI@2
            displayName: Smoke test deployed API
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                for i in $(seq 1 20); do
                  STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$(apiUrl)/health" || true)
                  [ "$STATUS" = "200" ] && echo "API healthy" && exit 0
                  echo "waiting for API ($STATUS)…"; sleep 15
                done
                echo "API never became healthy" && exit 1
