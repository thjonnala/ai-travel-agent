<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="950" viewBox="0 0 1800 950" font-family="'Segoe UI', 'Segoe UI Variable', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1A1A1A"/>
    </marker>
    <marker id="arrowNavy" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#243A5E"/>
    </marker>
    <marker id="arrowNavyStart" markerWidth="9" markerHeight="9" refX="1" refY="4" orient="auto">
      <path d="M8,0 L0,4 L8,8 Z" fill="#243A5E"/>
    </marker>
    <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3DAEE9"/>
      <stop offset="1" stop-color="#0F6CBD"/>
    </linearGradient>
    <linearGradient id="gSwa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EA0EF"/>
      <stop offset="1" stop-color="#2B5797"/>
    </linearGradient>

    <!-- Browser / SPA icon (64 x 48) -->
    <g id="icon-browser">
      <rect width="64" height="48" rx="7" fill="#E8F6FD" stroke="#0F6CBD" stroke-width="2"/>
      <path d="M0,7 a7,7 0 0 1 7,-7 h50 a7,7 0 0 1 7,7 v7 h-64 z" fill="#0F6CBD"/>
      <circle cx="9" cy="7" r="2.2" fill="#FFFFFF"/>
      <circle cx="17" cy="7" r="2.2" fill="#FFFFFF"/>
      <circle cx="25" cy="7" r="2.2" fill="#FFFFFF"/>
      <rect x="8" y="20" width="26" height="9" rx="4.5" fill="#0F6CBD"/>
      <rect x="22" y="33" width="26" height="9" rx="4.5" fill="#50E6FF"/>
    </g>

    <!-- Static Web Apps icon (56 x 48) -->
    <g id="icon-swa">
      <rect width="56" height="48" rx="8" fill="url(#gSwa)"/>
      <path d="M30,7 L18,27 h8 l-4,14 L36,21 h-9 z" fill="#FFFFFF"/>
    </g>

    <!-- App Service icon (56 x 48) -->
    <g id="icon-appsvc">
      <rect width="56" height="48" rx="8" fill="url(#gBlue)"/>
      <circle cx="26" cy="25" r="13" fill="none" stroke="#FFFFFF" stroke-width="2.4"/>
      <ellipse cx="26" cy="25" rx="5.5" ry="13" fill="none" stroke="#FFFFFF" stroke-width="1.8"/>
      <line x1="13" y1="25" x2="39" y2="25" stroke="#FFFFFF" stroke-width="1.8"/>
      <circle cx="43" cy="13" r="6.5" fill="#50E6FF"/>
      <circle cx="43" cy="13" r="2.4" fill="#0F6CBD"/>
      <g stroke="#0F6CBD" stroke-width="1.8">
        <line x1="43" y1="5" x2="43" y2="8"/>
        <line x1="43" y1="18" x2="43" y2="21"/>
        <line x1="35" y1="13" x2="38" y2="13"/>
        <line x1="48" y1="13" x2="51" y2="13"/>
      </g>
    </g>

    <!-- Azure OpenAI icon (hexagon, centered on 0,0) -->
    <g id="icon-aoai">
      <polygon points="26,0 13,22.5 -13,22.5 -26,0 -13,-22.5 13,-22.5" fill="#E8F6FD" stroke="#0F6CBD" stroke-width="3.5" stroke-linejoin="round"/>
      <circle cx="0" cy="0" r="4" fill="#0F6CBD"/>
      <circle cx="0" cy="-13" r="3" fill="#3DAEE9"/>
      <circle cx="11" cy="6.5" r="3" fill="#3DAEE9"/>
      <circle cx="-11" cy="6.5" r="3" fill="#3DAEE9"/>
      <line x1="0" y1="-13" x2="0" y2="0" stroke="#3DAEE9" stroke-width="2"/>
      <line x1="11" y1="6.5" x2="0" y2="0" stroke="#3DAEE9" stroke-width="2"/>
      <line x1="-11" y1="6.5" x2="0" y2="0" stroke="#3DAEE9" stroke-width="2"/>
    </g>

    <!-- Azure SQL icon (52 x 52) -->
    <g id="icon-sql">
      <path d="M0,9 v34 a26,9 0 0 0 52,0 v-34 z" fill="url(#gBlue)"/>
      <ellipse cx="26" cy="9" rx="26" ry="9" fill="#50E6FF"/>
      <text x="26" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">SQL</text>
    </g>

    <!-- Key Vault icon (52 x 48) -->
    <g id="icon-kv">
      <rect width="52" height="48" rx="8" fill="url(#gBlue)"/>
      <circle cx="20" cy="22" r="8" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
      <line x1="27" y1="22" x2="42" y2="22" stroke="#FFFFFF" stroke-width="3.5"/>
      <line x1="36" y1="22" x2="36" y2="30" stroke="#FFFFFF" stroke-width="3.5"/>
      <line x1="42" y1="22" x2="42" y2="28" stroke="#FFFFFF" stroke-width="3.5"/>
    </g>

    <!-- Application Insights icon (52 x 48) -->
    <g id="icon-insights">
      <rect width="52" height="48" rx="8" fill="url(#gBlue)"/>
      <circle cx="26" cy="19" r="9" fill="none" stroke="#FFFFFF" stroke-width="3"/>
      <rect x="21" y="28" width="10" height="5" rx="2" fill="#FFFFFF"/>
      <rect x="22.5" y="35" width="7" height="3.5" rx="1.75" fill="#FFFFFF"/>
      <polyline points="20,20 24,16 28,20 32,14" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    </g>

    <!-- Azure DevOps icon (52 x 48) -->
    <g id="icon-devops">
      <rect width="52" height="48" rx="8" fill="url(#gBlue)"/>
      <path d="M10,24 a8,8 0 0 1 14,-5 l4,5 4,-5 a8,8 0 1 1 0,10 l-4,-5 -4,5 a8,8 0 0 1 -14,-5 z" fill="none" stroke="#FFFFFF" stroke-width="3.2"/>
    </g>

    <!-- Itinerary document icon (44 x 52) -->
    <g id="icon-doc">
      <path d="M0,6 a6,6 0 0 1 6,-6 h24 l14,14 v32 a6,6 0 0 1 -6,6 h-32 a6,6 0 0 1 -6,-6 z" fill="#FFFFFF" stroke="#0F6CBD" stroke-width="2.4"/>
      <path d="M30,0 l14,14 h-10 a4,4 0 0 1 -4,-4 z" fill="#9CD2F0"/>
      <rect x="8" y="22" width="22" height="4" rx="2" fill="#3DAEE9"/>
      <rect x="8" y="30" width="28" height="4" rx="2" fill="#9CD2F0"/>
      <rect x="8" y="38" width="24" height="4" rx="2" fill="#9CD2F0"/>
      <circle cx="36" cy="44" r="9" fill="#57A300"/>
      <text x="36" y="49" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">$</text>
    </g>

    <!-- Chat refinement icon (56 x 44) -->
    <g id="icon-chat">
      <path d="M0,6 a6,6 0 0 1 6,-6 h26 a6,6 0 0 1 6,6 v12 a6,6 0 0 1 -6,6 h-14 l-8,8 v-8 h-4 a6,6 0 0 1 -6,-6 z" fill="#0F6CBD"/>
      <circle cx="11" cy="12" r="2.4" fill="#FFFFFF"/>
      <circle cx="19" cy="12" r="2.4" fill="#FFFFFF"/>
      <circle cx="27" cy="12" r="2.4" fill="#FFFFFF"/>
      <path d="M22,22 a6,6 0 0 1 6,-6 h22 a6,6 0 0 1 6,6 v10 a6,6 0 0 1 -6,6 h-4 v8 l-8,-8 h-10 a6,6 0 0 1 -6,-6 z" fill="#50E6FF"/>
      <rect x="28" y="22" width="22" height="3.4" rx="1.7" fill="#0F548C"/>
      <rect x="28" y="28" width="16" height="3.4" rx="1.7" fill="#0F548C"/>
    </g>

    <!-- Dashboard icon (52 x 48) -->
    <g id="icon-dash">
      <rect width="52" height="48" rx="8" fill="url(#gBlue)"/>
      <rect x="7"  y="7"  width="17" height="13" rx="3" fill="#FFFFFF"/>
      <rect x="28" y="7"  width="17" height="13" rx="3" fill="#9CD2F0"/>
      <rect x="7"  y="24" width="17" height="17" rx="3" fill="#9CD2F0"/>
      <rect x="28" y="24" width="17" height="17" rx="3" fill="#FFFFFF"/>
    </g>
  </defs>

  <!-- background -->
  <rect width="1800" height="950" fill="#FFFFFF"/>
  <text x="900" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#243A5E">Smart AI Travel Agent — Azure architecture flow</text>

  <!-- ===================== LEFT ZONE — Traveler (no border) ===================== -->
  <g>
    <circle cx="115" cy="190" r="17" fill="#0078D4"/>
    <rect x="87" y="213" width="56" height="36" rx="18" fill="#0078D4"/>
    <text x="115" y="274" text-anchor="middle" font-size="16" fill="#243A5E">Traveler</text>
  </g>

  <line x1="115" y1="295" x2="115" y2="420" stroke="#243A5E" stroke-width="2" stroke-dasharray="7 6" marker-start="url(#arrowNavyStart)" marker-end="url(#arrowNavy)"/>
  <text x="133" y="352" font-size="14" fill="#243A5E">Describe &amp; refine trips</text>
  <text x="133" y="371" font-size="14" fill="#243A5E">in natural language</text>

  <g>
    <use href="#icon-browser" x="83" y="440"/>
    <text x="115" y="515" text-anchor="middle" font-size="16" fill="#243A5E">Web browser</text>
    <text x="115" y="535" text-anchor="middle" font-size="13" fill="#5A6B7B">React SPA — chat planner,</text>
    <text x="115" y="552" text-anchor="middle" font-size="13" fill="#5A6B7B">dashboard, preferences</text>
  </g>

  <!-- browser -> SWA, step 1 -->
  <line x1="152" y1="464" x2="290" y2="464" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="221" y="438" text-anchor="middle" font-size="14" fill="#243A5E">HTTPS</text>
  <text x="221" y="456" text-anchor="middle" font-size="13" fill="#5A6B7B">aitravelagent.thiruapps.com</text>
  <g transform="translate(221,487)">
    <circle r="13" fill="#57A300" stroke="#FFFFFF" stroke-width="2"/>
    <text y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
  </g>

  <!-- ===================== Frontend hosting ===================== -->
  <rect x="295" y="375" width="200" height="215" rx="14" fill="none" stroke="#7FCDEE" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="395" y="405" text-anchor="middle" font-size="16" font-weight="600" fill="#243A5E">Frontend hosting</text>
  <use href="#icon-swa" x="367" y="425"/>
  <text x="395" y="500" text-anchor="middle" font-size="15" fill="#243A5E">Azure Static Web Apps</text>
  <text x="395" y="520" text-anchor="middle" font-size="13" fill="#5A6B7B">serves the SPA bundle</text>
  <text x="395" y="537" text-anchor="middle" font-size="13" fill="#5A6B7B">+ SPA route fallback</text>

  <!-- SWA -> API zone, step 2 -->
  <line x1="500" y1="464" x2="595" y2="464" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="548" y="438" text-anchor="middle" font-size="14" fill="#243A5E">REST/JSON</text>
  <text x="548" y="456" text-anchor="middle" font-size="13" fill="#5A6B7B">CORS · rate-limited</text>
  <g transform="translate(548,487)">
    <circle r="13" fill="#57A300" stroke="#FFFFFF" stroke-width="2"/>
    <text y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
  </g>

  <!-- ===================== MIDDLE ZONE — AI trip planning ===================== -->
  <rect x="600" y="110" width="660" height="730" rx="18" fill="none" stroke="#7FCDEE" stroke-width="2" stroke-dasharray="9 7"/>
  <text x="630" y="150" font-size="21" font-weight="700" fill="#243A5E">AI trip planning</text>
  <text x="630" y="177" font-size="15" fill="#5A6B7B">Generate and refine itineraries with structured outputs</text>

  <!-- API sub-box -->
  <rect x="625" y="205" width="230" height="380" rx="12" fill="none" stroke="#9AD2F0" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="740" y="234" text-anchor="middle" font-size="16" font-weight="600" fill="#243A5E">API</text>
  <use href="#icon-appsvc" x="712" y="270"/>
  <text x="740" y="348" text-anchor="middle" font-size="15" fill="#243A5E">App Service (Linux)</text>
  <text x="740" y="368" text-anchor="middle" font-size="15" fill="#243A5E">.NET 10 Web API</text>
  <text x="740" y="395" text-anchor="middle" font-size="13" fill="#5A6B7B">clean architecture ·</text>
  <text x="740" y="412" text-anchor="middle" font-size="13" fill="#5A6B7B">validation · USD costs ·</text>
  <text x="740" y="429" text-anchor="middle" font-size="13" fill="#5A6B7B">conversation memory</text>

  <!-- AI sub-box, step 3 -->
  <rect x="1010" y="205" width="225" height="180" rx="12" fill="none" stroke="#9AD2F0" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="1122" y="234" text-anchor="middle" font-size="16" font-weight="600" fill="#243A5E">AI planning</text>
  <g transform="translate(1016,211)">
    <circle r="13" fill="#57A300" stroke="#FFFFFF" stroke-width="2"/>
    <text y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
  </g>
  <use href="#icon-aoai" x="1122" y="290"/>
  <text x="1122" y="345" text-anchor="middle" font-size="15" fill="#243A5E">Azure OpenAI — gpt-4o</text>
  <text x="1122" y="365" text-anchor="middle" font-size="13" fill="#5A6B7B">strict JSON itinerary schema</text>

  <!-- Data sub-box, step 4 -->
  <rect x="1010" y="405" width="225" height="180" rx="12" fill="none" stroke="#9AD2F0" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="1122" y="434" text-anchor="middle" font-size="16" font-weight="600" fill="#243A5E">Data</text>
  <g transform="translate(1016,411)">
    <circle r="13" fill="#57A300" stroke="#FFFFFF" stroke-width="2"/>
    <text y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
  </g>
  <use href="#icon-sql" x="1096" y="448"/>
  <text x="1122" y="528" text-anchor="middle" font-size="15" fill="#243A5E">Azure SQL serverless</text>
  <text x="1122" y="548" text-anchor="middle" font-size="13" fill="#5A6B7B">trips · itinerary · chat history</text>

  <!-- API -> AI / API -> SQL arrows -->
  <line x1="858" y1="290" x2="1003" y2="290" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="930" y="268" text-anchor="middle" font-size="13" fill="#5A6B7B">request + preferences</text>
  <text x="930" y="284" text-anchor="middle" font-size="13" fill="#5A6B7B">+ current itinerary</text>
  <line x1="858" y1="490" x2="1003" y2="490" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="930" y="468" text-anchor="middle" font-size="13" fill="#5A6B7B">validated itinerary</text>
  <text x="930" y="484" text-anchor="middle" font-size="13" fill="#5A6B7B">(EF Core)</text>

  <!-- Platform services row -->
  <rect x="625" y="625" width="610" height="185" rx="12" fill="none" stroke="#9AD2F0" stroke-width="1.6" stroke-dasharray="6 5"/>
  <text x="930" y="654" text-anchor="middle" font-size="16" font-weight="600" fill="#243A5E">Platform services</text>
  <line x1="740" y1="588" x2="740" y2="622" stroke="#243A5E" stroke-width="1.6" stroke-dasharray="5 5" marker-end="url(#arrowNavy)"/>

  <use href="#icon-kv" x="688" y="675"/>
  <text x="714" y="748" text-anchor="middle" font-size="14" fill="#243A5E">Key Vault</text>
  <text x="714" y="766" text-anchor="middle" font-size="12" fill="#5A6B7B">secrets via</text>
  <text x="714" y="781" text-anchor="middle" font-size="12" fill="#5A6B7B">managed identity</text>

  <use href="#icon-insights" x="888" y="675"/>
  <text x="914" y="748" text-anchor="middle" font-size="14" fill="#243A5E">App Insights</text>
  <text x="914" y="766" text-anchor="middle" font-size="12" fill="#5A6B7B">logs · telemetry</text>

  <use href="#icon-devops" x="1088" y="675"/>
  <text x="1114" y="748" text-anchor="middle" font-size="14" fill="#243A5E">Azure DevOps</text>
  <text x="1114" y="766" text-anchor="middle" font-size="12" fill="#5A6B7B">CI/CD: infra (Bicep)</text>
  <text x="1114" y="781" text-anchor="middle" font-size="12" fill="#5A6B7B">+ app pipelines</text>

  <!-- middle zone -> right zone, step 5 -->
  <line x1="1262" y1="464" x2="1345" y2="464" stroke="#1A1A1A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1303" y="438" text-anchor="middle" font-size="13" fill="#5A6B7B">itinerary +</text>
  <text x="1303" y="455" text-anchor="middle" font-size="13" fill="#5A6B7B">assistant reply</text>
  <g transform="translate(1303,487)">
    <circle r="13" fill="#57A300" stroke="#FFFFFF" stroke-width="2"/>
    <text y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">5</text>
  </g>

  <!-- ===================== RIGHT ZONE — Trip experience ===================== -->
  <rect x="1350" y="160" width="400" height="640" rx="18" fill="none" stroke="#7FCDEE" stroke-width="2" stroke-dasharray="9 7"/>
  <text x="1378" y="200" font-size="21" font-weight="700" fill="#243A5E">Trip experience</text>

  <use href="#icon-doc" x="1528" y="240"/>
  <text x="1550" y="325" text-anchor="middle" font-size="16" font-weight="600" fill="#243A5E">Day-by-day itinerary</text>
  <text x="1550" y="346" text-anchor="middle" font-size="13" fill="#5A6B7B">morning/afternoon/evening blocks,</text>
  <text x="1550" y="363" text-anchor="middle" font-size="13" fill="#5A6B7B">USD cost estimates per day and trip</text>

  <use href="#icon-chat" x="1522" y="415"/>
  <text x="1550" y="500" text-anchor="middle" font-size="16" font-weight="600" fill="#243A5E">Chat refinement</text>
  <text x="1550" y="521" text-anchor="middle" font-size="13" fill="#5A6B7B">"make day 2 cheaper" — context-aware</text>
  <text x="1550" y="538" text-anchor="middle" font-size="13" fill="#5A6B7B">updates that preserve the rest</text>

  <use href="#icon-dash" x="1524" y="590"/>
  <text x="1550" y="668" text-anchor="middle" font-size="16" font-weight="600" fill="#243A5E">Saved trips dashboard</text>
  <text x="1550" y="689" text-anchor="middle" font-size="13" fill="#5A6B7B">open · duplicate · delete ·</text>
  <text x="1550" y="706" text-anchor="middle" font-size="13" fill="#5A6B7B">traveler preferences profile</text>

  <!-- ===================== Microsoft Azure logo ===================== -->
  <g>
    <path d="M60,908 L88,853 L116,908 L101,908 L88,881 L75,908 Z" fill="#0078D4"/>
    <path d="M88,853 L116,908 L101,908 L88,881 Z" fill="#3DAEE9"/>
    <text x="130" y="900" font-size="22" fill="#243A5E">Microsoft <tspan font-weight="700">Azure</tspan></text>
  </g>
</svg>
