name: Backend CI

# Quality gate for the API. The backend is deployed via the consolidated
# thiru-apps-api (Azure) pipelines; this just runs the tests.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet test backend/TravelAgent.slnx --configuration Release --nologo
